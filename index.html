<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼了个豆 - 拼豆游戏</title>
    <link rel="icon" href="logo.png" type="image/png">
    <style>
        :root {
            --primary: #7986CB;
            --accent: #FF8DA1;
            --success: #81D4A9;
            --bg: #f8f9ff;
            --text: #333;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* 导航栏 */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 主体内容 */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 100px 10% 40px;
            background: linear-gradient(180deg, #fff 0%, var(--bg) 100%);
        }

        .badge {
            background: rgba(121, 134, 203, 0.1);
            color: var(--primary);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
            display: inline-block;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            font-size: 1.5rem;
            color: #666;
            margin: 20px 0 40px;
        }

        /* 按钮容器 */
        .cta-group {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .cta-button {
            background: var(--primary);
            color: white;
            padding: 16px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(121,134,203,0.3);
            transition: all 0.3s;
            display: inline-block;
        }

        .cta-button:hover {
            box-shadow: 0 15px 30px rgba(121,134,203,0.5);
            background: var(--accent);
            transform: translateY(-2px);
        }

        .form-button {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 14px 38px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            display: inline-block;
        }

        .form-button:hover {
            background: rgba(121,134,203,0.05);
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }

        /* 更新日志区域 */
        .update-section {
            width: 100%;
            max-width: 600px;
            text-align: left;
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            margin-bottom: 40px;
        }

        .update-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .version-tag {
            background: var(--accent);
            color: white;
            padding: 2px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
        }

        .update-title {
            font-weight: bold;
            color: var(--text);
            font-size: 18px;
        }

        .update-list {
            list-style: none;
            padding: 0;
            margin: 0;
            color: #666;
            font-size: 15px;
        }

        .update-list li {
            margin-bottom: 8px;
            padding-left: 20px;
            position: relative;
        }

        .update-list li::before {
            content: "•";
            color: var(--primary);
            font-weight: bold;
            position: absolute;
            left: 0;
        }

        /* 像素豆效果装饰 */
        .bead-decoration {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 4px;
            z-index: -1;
            opacity: 0.2;
        }

        /* 手机端适配 */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .hero { padding: 60px 5%; }
            .cta-group { flex-direction: column; width: 80%; }
            .cta-button, .form-button { width: 100%; box-sizing: border-box; }
            .update-section { width: 90%; padding: 20px; }
        }

        footer {
            margin-top: 60px;
            padding: 40px;
            text-align: center;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">
            <img src="logo.png" alt="logo" style="width: 32px; height: 32px; border-radius: 8px; object-fit: cover;">
            <span>拼了个豆</span>
        </div>

        <div class="nav-links">
            <span style="color: #999; font-size: 14px;">Beta 0.0.2</span>
        </div>
    </nav>

    <div class="hero">
        <div class="badge">内测中 · 持续更新</div>
        <h1>拼了个豆</h1>
        <div class="sub-title">超好玩的拼豆像素小游戏</div>
        
        <p style="max-width: 600px; color: #777; margin-bottom: 40px;">
            这是一款极简治愈的像素拼豆游戏。目前我们正在进行<b>微信小程序端</b>的深度内测，欢迎申请加入内测或提交建议反馈。
        </p>

        <div class="cta-group">
            <a href="https://qm.qq.com/q/xBCK3aRxle" class="cta-button">添加QQ好友，加入内测</a>
            <a href="https://docs.qq.com/form/page/DZnRqVWxjRWhGYkpv" class="form-button">📝 提交建议反馈</a>
        </div>

        <!-- 版本更新内容显示区域 -->
        <div class="log-container">
            <!-- 当前版本 -->
            <div class="update-section">
                <div class="update-header">
                    <span class="version-tag">Beta 0.0.3</span>
                    <span class="update-title">当前版本动态</span>
                </div>
                <ul class="update-list">
                    <li>✨ <b>推出创意工坊：</b> 支持自定义上传图片生成拼豆图纸，开启无限创作空间。</li>
                    <li>✨ <b>功能优化：</b> 支持显示当前关卡各颜色块剩余数量；默认打开底图预览；增加了更多关卡。</li>
                    <li>✨ <b>bug修复：</b> 优化了部分关卡无法通关的问题；修复了其他已知问题。</li>
                </ul>
            </div>

            <!-- 创意工坊专题前瞻 -->
            <!-- <div class="update-section upcoming">
                <div class="update-header">
                    <span class="version-tag">Coming Soon</span>
                    <span class="update-title">Beta 0.0.3 · 功能前瞻</span>
                </div>
                <ul class="update-list">
                    <li>🎨 <b>引入创意工坊：</b> 支持自定义上传图片生成拼豆图纸，开启无限创作空间。</li>
                </ul>
            </div> -->
        </div>

    </div>

    <!-- 背景点缀 -->
    <div class="bead-decoration" style="top: 20%; left: 10%; background: var(--primary);"></div>
    <div class="bead-decoration" style="top: 15%; right: 15%; background: var(--accent);"></div>
    <div class="bead-decoration" style="bottom: 30%; left: 15%; background: var(--success);"></div>
    <div class="bead-decoration" style="top: 50%; right: 10%; background: #F9C773;"></div>

    <footer>
        &copy; 2026 拼了个豆. All Rights Reserved.
    </footer>

</body>
</html>
